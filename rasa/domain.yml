version: "3.1"

intents:
  - greet
  - goodbye
  - predefined_query
  - bot_challenge

responses:
  utter_greet:
    - text: "Hello! How can I help you today?"
  utter_goodbye:
    - text: "Goodbye!"
  utter_iamabot:
    - text: "I am a Rasa-powered assistant."
  utter_predefined_answer:
    - text: "Here is the predefined answer for your request."

actions:
  - action_predefined_router

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
