# =========================
# 1) WANTS SETTLEMENT
# =========================

- intent: wants_settlement__plan_accepted
  examples: |
    - Okay, I will go ahead with this plan, but I need it in writing first.
    - Fine, I will clear it as per this schedule, but no extra charges later.
    - I will arrange the money; just confirm the final settlement amount.
    - I accept the plan; please provide written confirmation.
    - This plan works for me if everything is documented.
